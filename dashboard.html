<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kano 실시간 결과 — 마이리얼트립 AI 챗봇</title>
<style>
  :root{--ink:#1a1a2e;--muted:#6b6b7b;--line:#e7e7ef;--bg:#f6f6fb;
    --brand:#2563eb;--ok:#059669;--warn:#dc2626}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 60px}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  .top h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.02em}
  .top .sub{font-size:13px;color:var(--muted)}
  .live{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ok);background:#ecfdf5;padding:7px 14px;border-radius:999px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .step{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:18px}
  .step-head{display:flex;align-items:center;gap:13px;margin-bottom:6px}
  .step-num{flex:0 0 auto;width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#1d4ed8,#0ea5a4);
    color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .step-head h2{margin:0;font-size:18px;font-weight:700;letter-spacing:-.01em}
  .step-head .tag{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}

  .explain{background:#eef4ff;border:1px solid #d6e2ff;border-radius:12px;padding:13px 16px;
    font-size:13px;color:#33415c;line-height:1.75;margin-top:14px}
  .explain b{color:#1d4ed8}
  .explain .formula{display:block;background:#fff;border:1px dashed #7c9cff;border-radius:10px;
    padding:11px 14px;margin:9px 0;font-size:13.5px;color:#1e293b;font-weight:700;letter-spacing:-.01em}
  .explain .ex{display:inline-block;background:#fff7ed;border-radius:6px;padding:2px 8px;font-weight:700;color:#b45309}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
  .metric{background:#f8faff;border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .metric .l{font-size:12.5px;color:var(--muted);margin-bottom:4px}
  .metric .v{font-size:26px;font-weight:800;letter-spacing:-.02em}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 7px;border-bottom:1px solid var(--line);text-align:center}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.name{text-align:left;font-weight:600;font-size:13px}
  .scroll{overflow-x:auto}

  .badge{display:inline-block;padding:3px 10px;border-radius:999px;color:#fff;font-size:12px;font-weight:700}

  .kano{border-collapse:separate;border-spacing:4px;min-width:560px}
  .kano th{background:#f1f5f9;border-radius:8px;padding:7px 6px;font-size:11.5px;color:#475569;border:none}
  .kano td.rh{background:#f1f5f9;border-radius:8px;font-weight:700;font-size:12px;color:#475569;text-align:right;padding:8px 10px;white-space:nowrap;border:none}
  .kano td.kc{border-radius:8px;color:#fff;font-weight:700;font-size:12px;padding:10px 6px;text-align:center;border:none}

  .cat-defs{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:8px;margin-top:12px}
  .cat-def{border-left:5px solid;padding:9px 12px;background:#fafafe;border-radius:8px;font-size:12.5px;line-height:1.5}
  .cat-def b{display:block;font-size:13px;margin-bottom:1px}

  .final-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-top:4px}
  .fc{border:1px solid var(--line);border-top:5px solid;border-radius:12px;padding:12px 14px;background:#fff}
  .fc .fn{font-size:11px;color:var(--muted);font-weight:700}
  .fc .ft{font-size:13.5px;font-weight:700;margin:2px 0 9px;line-height:1.35}

  .prio{display:flex;align-items:center;gap:13px;padding:11px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff}
  .prio .rank{flex:0 0 auto;min-width:66px;text-align:center;font-size:12px;font-weight:800;padding:6px 8px;border-radius:8px;color:#fff}
  .prio .pinfo{flex:1;min-width:0}
  .prio .pn{font-size:13.5px;font-weight:700}
  .prio .pc{font-size:12px;color:var(--muted)}
  .prio .pcoef{flex:0 0 auto;font-size:11.5px;color:var(--muted);text-align:right;line-height:1.4}

  .cv{position:relative;width:100%}
  .ph{text-align:center;color:var(--muted);padding:30px 20px;font-size:13px;background:#f8faff;border-radius:12px;margin-top:6px}
  .ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .btn{border:1px solid var(--line);background:#fff;padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;color:var(--ink)}
  .btn:hover{background:var(--bg)}
  .hl{background:#fff7ed}

  /* 5단계: 만족·불만족계수 학생용 카드/예시 */
  .coef-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .coef-card{border-radius:14px;padding:16px 18px;border:1px solid}
  .coef-card.blue{background:#eff4ff;border-color:#bfd3ff}
  .coef-card.red{background:#fef2f2;border-color:#fbcccc}
  .coef-card .cc-t{font-size:17px;font-weight:800;margin-bottom:6px}
  .coef-card.blue .cc-t{color:#1d4ed8}
  .coef-card.red .cc-t{color:#dc2626}
  .coef-card .cc-q{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:10px;line-height:1.5}
  .coef-card .cc-l{font-size:12.5px;color:#475569;line-height:1.75}
  .combo td,.combo th{text-align:center}
  .combo td:nth-child(3){text-align:left;color:#475569}
  .ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .ex-box{border-radius:12px;padding:14px 16px;border:1px solid}
  .ex-box.red{background:#fef2f2;border-color:#fbcccc}
  .ex-box.blue{background:#eff4ff;border-color:#bfd3ff}
  .ex-box .eb-t{font-size:14px;font-weight:800;margin-bottom:8px}
  .ex-box .eb-l{font-size:12.5px;color:#475569;line-height:1.75}
  .ex-box .eb-r{font-size:13px;font-weight:700;margin-top:8px;color:var(--ink)}
  .formula-toggle{margin-top:14px;font-size:12.5px}
  .formula-toggle summary{cursor:pointer;color:var(--muted);font-weight:600;user-select:none}
  .formula-toggle .formula-body{background:#f8faff;border:1px dashed #94a3b8;border-radius:8px;padding:10px 13px;margin-top:8px;color:#475569;line-height:1.8}
  @media(max-width:620px){.coef-cards,.ex-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Kano 모형 실시간 결과 대시보드</h1>
      <div class="sub">마이리얼트립 AI 챗봇 기능 분류 · 세션 <span id="sess"></span></div>
    </div>
    <div class="live"><span class="dot"></span>실시간 연결됨</div>
  </div>

  <div id="content"></div>

  <div class="ctrl">
    <button class="btn" id="demo">예시 데이터 30명 추가</button>
    <button class="btn" id="reset">이 세션 응답 전체 삭제</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
document.getElementById('sess').textContent=SESSION_CODE;
let rows=[];

// 개선 우선순위: 당연적1 > 일원적2 > 매력적3 > 무관심4 > 의심 > 역품질(최하)
const PRIORITY_RANK={M:1,O:2,A:3,I:4,Q:5,R:6};
const PRIORITY_INFO={
  M:{label:"1순위",color:"#b45309"},
  O:{label:"2순위",color:"#0f766e"},
  A:{label:"3순위",color:"#2563eb"},
  I:{label:"4순위",color:"#6b7280"},
  Q:{label:"유의",color:"#7c3aed"},
  R:{label:"최하순위",color:"#dc2626"},
};

async function fetchAll(){
  const {data,error}=await supabase.from('kano_responses')
    .select('*').eq('session',SESSION_CODE).order('created_at',{ascending:true});
  if(error){console.error(error);return;}
  rows=data||[]; draw();
}
supabase.channel('rt-kano')
  .on('postgres_changes',{event:'INSERT',schema:'public',table:'kano_responses'},
    p=>{ if(p.new.session===SESSION_CODE){ rows.push(p.new); draw(); }})
  .subscribe();

function analyze(){
  const res={};
  FEATURES.forEach(f=>res[f.id]={A:0,O:0,M:0,I:0,R:0,Q:0,resp:0});
  rows.forEach(r=>{
    FEATURES.forEach(f=>{
      const pv=r.pos[f.id], nv=r.neg[f.id];
      if(pv==null||nv==null) return;
      res[f.id].resp++;
      res[f.id][classify(pv,nv)]++;
    });
  });
  FEATURES.forEach(f=>{
    const c=res[f.id];
    let top=CAT_ORDER[0];
    CAT_ORDER.forEach(k=>{ if(c[k]>c[top]) top=k; });
    c.final=top;
    const denom=c.A+c.O+c.M+c.I;
    c.sat = denom? (c.A+c.O)/denom : 0;
    c.dissat = denom? (c.O+c.M)/denom : 0;
    c.total = c.A+c.O+c.M+c.I+c.R+c.Q;
  });
  return res;
}

function stepHead(num,title,tag){
  return '<div class="step-head"><div class="step-num">'+num+'</div><div><h2>'+title+'</h2>'
    +(tag?'<div class="tag">'+tag+'</div>':'')+'</div></div>';
}
function ph(msg){ return '<div class="ph">'+msg+'</div>'; }

function kanoTableHtml(){
  let h='<div class="scroll"><table class="kano"><thead>'
    +'<tr><th></th><th colspan="5" style="background:#fff5e9;color:#b45309">부정 응답 (없을 때)</th></tr>'
    +'<tr><th style="background:#eff4ff;color:#2563eb">긍정 ↓ / 부정 →</th>';
  CHOICES.forEach(c=>{ h+='<th>'+c.label+'</th>'; });
  h+='</tr></thead><tbody>';
  KANO_TABLE.forEach((row,pi)=>{
    h+='<tr><td class="rh">'+CHOICES[pi].label+'</td>';
    row.forEach(code=>{ const m=CAT_META[code]; h+='<td class="kc" style="background:'+m.color+'">'+m.name+'</td>'; });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}
function catDefsHtml(){
  return '<div class="cat-defs">'+CAT_ORDER.map(k=>{const m=CAT_META[k];
    return '<div class="cat-def" style="border-left-color:'+m.color+'"><b style="color:'+m.color+'">'
      +m.name+' ('+m.full+')</b>'+m.desc+'</div>';
  }).join('')+'</div>';
}

function draw(){
  const has=rows.length>0;
  const R=has?analyze():null;
  let H='';

  // STEP 1
  H+='<div class="step">'+stepHead(1,'응답 수집','Kano 설문 데이터');
  if(has){
    H+='<div class="metrics">'
      +'<div class="metric"><div class="l">현재 응답자 수</div><div class="v">'+rows.length+'명</div></div>'
      +'<div class="metric"><div class="l">조사 기능 수</div><div class="v">'+FEATURES.length+'개</div></div>'
      +'<div class="metric"><div class="l">수집된 응답 문항</div><div class="v">'+(rows.length*FEATURES.length*2)+'개</div></div></div>';
    H+='<div class="scroll" style="margin-top:12px"><table><thead><tr><th style="text-align:left">기능</th><th>응답 수</th></tr></thead><tbody>';
    H+=FEATURES.map((f,i)=>'<tr><td class="name">'+(i+1)+'. '+f.name+'</td><td>'+R[f.id].resp+'명</td></tr>').join('');
    H+='</tbody></table></div>';
  } else {
    H+=ph('아직 응답이 없습니다. 학생이 제출하거나 아래 "예시 데이터 30명 추가"를 누르면 표시됩니다.');
  }
  H+='<div class="explain">Kano 모형은 각 기능에 대해 <b>있을 때(긍정)</b>와 <b>없을 때(부정)</b> 두 가지 질문을 합니다. '
    +'응답자는 <b>마음에 든다 / 당연하다 / 별 느낌 없다 / 어쩔 수 없다 / 마음에 들지 않는다</b> 중 하나를 선택합니다.</div>';
  H+='</div>';

  // STEP 2 (정적)
  H+='<div class="step">'+stepHead(2,'Kano 평가표로 품질요소 분류','긍정 × 부정 조합표');
  H+=kanoTableHtml();
  H+='<div class="explain">긍정 응답과 부정 응답의 <b>조합</b>으로 품질 유형이 결정됩니다. '
    +'예를 들어 <span class="ex">긍정 = \'마음에 든다\' + 부정 = \'어쩔 수 없다\' → 매력적 품질</span></div>';
  H+=catDefsHtml();
  H+='</div>';

  // STEP 3
  H+='<div class="step">'+stepHead(3,'기능별 분류 집계표','응답자 분류 카운트');
  if(has){
    H+='<div class="scroll"><table><thead><tr><th style="text-align:left">AI 챗봇 기능</th>'
      +'<th>매력적</th><th>일원적</th><th>당연적</th><th>무관심</th><th>역품질</th><th>의심</th>'
      +'<th>최종 분류</th></tr></thead><tbody>';
    H+=FEATURES.map((f,i)=>{const c=R[f.id],m=CAT_META[c.final];
      return '<tr><td class="name">'+(i+1)+'. '+f.name+'</td>'
        +'<td>'+c.A+'</td><td>'+c.O+'</td><td>'+c.M+'</td><td>'+c.I+'</td><td>'+c.R+'</td><td>'+c.Q+'</td>'
        +'<td><span class="badge" style="background:'+m.color+'">'+m.name+'</span></td></tr>';
    }).join('');
    H+='</tbody></table></div>';
  } else { H+=ph('응답이 들어오면 기능별 분류가 집계됩니다.'); }
  H+='<div class="explain">각 기능에 대해 응답자들의 분류를 집계합니다. <b>가장 많이 나온 유형이 최종 분류</b>가 됩니다. '
    +'<span class="ex">예) 매력적 20명, 일원적 5명, 당연적 3명 → 최종: 매력적</span></div>';
  H+='</div>';

  // STEP 4
  H+='<div class="step">'+stepHead(4,'최빈값 기준 최종 분류 결과','11개 기능 한눈에');
  if(has){
    H+='<div class="final-cards">'+FEATURES.map((f,i)=>{const c=R[f.id],m=CAT_META[c.final];
      return '<div class="fc" style="border-top-color:'+m.color+'"><div class="fn">기능 '+(i+1)+'</div>'
        +'<div class="ft">'+f.name+'</div>'
        +'<div><span class="badge" style="background:'+m.color+'">'+m.name+'</span> '
        +'<span style="font-size:12px;color:var(--muted)">'+c[c.final]+'/'+c.total+'명</span></div></div>';
    }).join('')+'</div>';
  } else { H+=ph('응답이 들어오면 기능별 최종 분류 카드가 표시됩니다.'); }
  H+='<div class="explain"><b>최빈값</b>(가장 많이 나온 분류)을 기준으로 각 기능의 품질 유형을 결정합니다.</div>';
  H+='</div>';

  // STEP 5 (개선 우선순위)
  H+='<div class="step">'+stepHead(5,'개선 우선순위 결정','실행 전략');
  if(has){
    const order=FEATURES.slice().sort((a,b)=>{
      const ra=PRIORITY_RANK[R[a.id].final], rb=PRIORITY_RANK[R[b.id].final];
      if(ra!==rb) return ra-rb;
      return R[b.id].dissat - R[a.id].dissat;
    });
    H+=order.map(f=>{const c=R[f.id],m=CAT_META[c.final],pi=PRIORITY_INFO[c.final];const idx=FEATURES.indexOf(f)+1;
      return '<div class="prio"><div class="rank" style="background:'+pi.color+'">'+pi.label+'</div>'
        +'<div class="pinfo"><div class="pn">'+idx+'. '+f.name+'</div><div class="pc">'+m.name+' · '+m.desc+'</div></div></div>';
    }).join('');
  } else { H+=ph('응답이 들어오면 우선순위가 정렬됩니다.'); }
  H+='<div class="explain"><b>당연적</b> 품질은 없으면 고객이 떠납니다. 먼저 당연적 기능을 완벽하게 갖추고, '
    +'그 다음 <b>일원적</b> 기능의 성능을 높이며, <b>매력적</b> 기능으로 경쟁사와 차별화합니다. '
    +'<b>역품질</b> 기능은 제거하거나 선택형으로 바꿔야 합니다.<br>'
    +'<span class="ex">1순위 당연적 → 2순위 일원적 → 3순위 매력적 → 4순위 무관심 → 최하 역품질</span></div>';
  H+='</div>';

  document.getElementById('content').innerHTML=H;
}

document.getElementById('demo').addEventListener('click', async ()=>{
  const profile={
    f1:{p:[0,1],n:[4]}, f2:{p:[0,1],n:[4]}, f3:{p:[0],n:[2,3]}, f4:{p:[0,1],n:[4]},
    f5:{p:[0,1],n:[4]}, f6:{p:[0],n:[4]}, f7:{p:[2],n:[2]}, f8:{p:[0,1],n:[4]},
    f9:{p:[0],n:[2,3]}, f10:{p:[0],n:[2,3]}, f11:{p:[3,4],n:[0,1]},
  };
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const recs=[];
  for(let n=0;n<30;n++){ const pos={},neg={};
    FEATURES.forEach(f=>{const pr=profile[f.id]; pos[f.id]=pick(pr.p); neg[f.id]=pick(pr.n);});
    recs.push({session:SESSION_CODE,pos,neg});
  }
  const {error}=await supabase.from('kano_responses').insert(recs);
  if(error) alert('예시 추가 실패: '+error.message);
});
document.getElementById('reset').addEventListener('click', async ()=>{
  if(!confirm('이 세션('+SESSION_CODE+')의 모든 응답을 삭제할까요?')) return;
  const {error}=await supabase.from('kano_responses').delete().eq('session',SESSION_CODE);
  if(error){alert('삭제 실패: '+error.message);return;}
  rows=[]; draw();
});

fetchAll();
</script>
</body>
</html>
